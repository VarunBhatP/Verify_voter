services:
  - type: web
    name: voter-verify-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: RENDER_SERVICE_PLAN
        value: free
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false

  - type: web
    name: voter-verify-face
    runtime: python
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn face_verification_server:app --bind 0.0.0.0:$PORT --log-level debug --timeout 120
    envVars:
      - key: PORT
        value: 5001
      - key: RENDER_SERVICE_PLAN
        value: free
      - key: BACKEND_URL
        value: https://voter-verify-backend.vcin.onrender.com
      - key: BACKEND_API_KEY
        sync: false
      - key: DEEPFACE_HOME
        value: /opt/render/project/src/deepface_weights
      - key: PYTHONUNBUFFERED
        value: 1 